package:
  name: bitcoin-core
  version: 30.2
  epoch: 0
  description: Bitcoin Core daemon
  copyright:
    - license: MIT

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - build-base
      - cmake
      - linux-headers
      - pkgconf
      - python3
      - libevent-dev
      - boost-dev
      - zeromq-dev
      - libzmq-static
      - gpg
      - gpg-agent
      - wget
      - curl
      - jq

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bitcoin/bitcoin.git
      tag: v${{package.version}}

  - runs: |
      export GNUPGHOME="$(mktemp -d)"
      trap 'rm -rf "$GNUPGHOME"' EXIT

      curl -s "https://api.github.com/repos/bitcoin-core/guix.sigs/contents/builder-keys" | jq -r '.[].download_url' | while read url; do curl -s "$url" | gpg --import; done

      git verify-tag "v${{package.version}}"

  - runs: |
      export BITCOIN_GENBUILD_NO_GIT=1
      cmake -B build \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DBUILD_BITCOIN_BIN=OFF \
        -DBUILD_DAEMON=ON \
        -DBUILD_GUI=OFF \
        -DBUILD_CLI=ON \
        -DBUILD_TX=ON \
        -DBUILD_UTIL=OFF \
        -DBUILD_UTIL_CHAINSTATE=OFF \
        -DBUILD_WALLET_TOOL=OFF \
        -DENABLE_WALLET=OFF \
        -DENABLE_IPC=OFF \
        -DENABLE_EXTERNAL_SIGNER=OFF \
        -DBUILD_TESTS=OFF \
        -DBUILD_GUI_TESTS=OFF \
        -DBUILD_BENCH=OFF \
        -DBUILD_FUZZ_BINARY=OFF \
        -DBUILD_FOR_FUZZING=OFF \
        -DBUILD_KERNEL_LIB=OFF \
        -DWITH_ZMQ=ON \
        -DWITH_USDT=OFF \
        -DWITH_QRENCODE=OFF \
        -DWITH_DBUS=OFF \
        -DREDUCE_EXPORTS=ON \
        -DWERROR=OFF \
        -DWITH_CCACHE=OFF \
        -DINSTALL_MAN=OFF

      cmake --build build -j "$(nproc)"

      strip build/bin/bitcoind build/bin/bitcoin-cli build/bin/bitcoin-tx
      mkdir -p "${{targets.destdir}}/usr/bin"
      cp build/bin/bitcoind "${{targets.destdir}}/usr/bin/bitcoind"
      cp build/bin/bitcoin-cli "${{targets.destdir}}/usr/bin/bitcoin-cli"
      cp build/bin/bitcoin-tx "${{targets.destdir}}/usr/bin/bitcoin-tx"

update:
  enabled: true
  github:
    identifier: bitcoin/bitcoin
    use-tag: true
    tag-filter-prefix: v30.
    strip-prefix: v
