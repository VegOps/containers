name: Setup build tools
description: Install melange and/or apko

inputs:
  melange-version:
    description: melange version to install
    required: false
    default: ""
  apko-version:
    description: apko version to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install melange
      if: ${{ inputs.melange-version != '' }}
      shell: bash
      run: |
        set -euo pipefail
        go install chainguard.dev/melange@${{ inputs.melange-version }}
        echo "$HOME/go/bin" >> "$GITHUB_PATH"

    - name: Install apko
      if: ${{ inputs.apko-version != '' }}
      shell: bash
      run: |
        set -euo pipefail
        go install chainguard.dev/apko@${{ inputs.apko-version }}
        echo "$HOME/go/bin" >> "$GITHUB_PATH"
